name: deploy-main-to-gcp.yml

on:
  push:
    branches: [iss9]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH
        shell: bash
        run: |
          set -e

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          APP_DIR: /home/ccantrell2/coco-devops
          PM2_NAME: app
        run: |
          ssh -i ~/.ssh/id_rsa -T "$SSH_USER@$SSH_HOST" <<EOF
            set -e
            sudo -u ccantrell2 -H bash -lc '
              cd "$APP_DIR"
              git reset --hard
              git pull
              npm ci

              pm2 delete "$PM2_NAME" || true
              pm2 start -f app.js --name "$PM2_NAME"
              pm2 save
            '
          EOF
